<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex Asíncrona</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Pokédex Asíncrona</h1>
    <p class="subtitle">Consulta Pokémon usando PokeAPI y visualiza su información principal.</p>

    <section class="search">
      <input id="pokemonInput" type="text" placeholder="Ej: pikachu, bulbasaur..." />
      <button id="searchBtn" type="button">Buscar</button>
    </section>

    <p id="status"></p>
    <section id="result"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
